[build]
  command = "npm run build"
  publish = "dist"
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "22"
  PUBLIC_BASE_PATH = "/"

# Netlify ist als Vorschau/Deployment bewusst deaktiviert.
# Die weitere Vorschau erfolgt ueber GitHub Pages.
# Der spaetere Livegang erfolgt ueber GitHub Actions und FTP.
