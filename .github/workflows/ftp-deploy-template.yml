name: Build website package without FTP upload

on:
  workflow_dispatch:

jobs:
  build-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare package folder
        run: |
          mkdir -p build-check
          cp -R php-site/* build-check/

      - name: Show package contents
        run: find build-check -maxdepth 3 -type f | sort

# FTP upload is intentionally disabled.
# It will be enabled only after the complete website is finished and approved.
# Required later as GitHub Secrets:
# FTP_SERVER
# FTP_USERNAME
# FTP_PASSWORD
# FTP_SERVER_DIR
